name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format)
        run: ruff format --check .

      - name: Run tests with coverage
        run: pytest --cov=. --cov-report=term-missing

  deploy:
    name: Deploy to Hugging Face Spaces
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-hf-spaces
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          lfs: true

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
        run: |
          # Strip any whitespace/newlines that snuck in via the GitHub secret
          # editor — leftover \n in the value corrupts the remote URL.
          HF_TOKEN=$(printf '%s' "$HF_TOKEN" | tr -d '[:space:]')
          HF_USERNAME=$(printf '%s' "$HF_USERNAME" | tr -d '[:space:]')
          HF_SPACE=$(printf '%s' "$HF_SPACE" | tr -d '[:space:]')

          if [ -z "$HF_TOKEN" ] || [ -z "$HF_USERNAME" ] || [ -z "$HF_SPACE" ]; then
            echo "::error::HF_TOKEN, HF_USERNAME, and HF_SPACE secrets must be set"
            exit 1
          fi

          # HF Spaces rejects raw binaries in pushed history (recommends Xet/LFS).
          # Push a clean snapshot: orphan commit with images/ stripped from the
          # working tree. The GitHub repo keeps images/; only HF sees a slim copy.
          rm -rf images/
          git checkout --orphan hf-deploy
          git add -A
          git commit -m "deploy: snapshot for HF Space"

          git remote add space "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE}"
          git push --force space HEAD:main
